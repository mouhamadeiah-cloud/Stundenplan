<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Die Primel Eiscafé - Stundenplan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-title">
                <h1>Die Primel Eiscafé</h1>
                <p class="subtitle" id="currentDateInfo">Stundenplan für aktuelle Woche, Monat und Jahr</p>
            </div>
            <button class="hamburger" id="hamburgerBtn" aria-label="Menü">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </header>

        <!-- Sidebar Menu -->
        <nav class="sidebar" id="sidebar">
            <ul class="sidebar-menu">
                <li><a href="index.html" class="active">Stundenplan anzeigen</a></li>
                <li><a href="admin.html">Admin-Bereich</a></li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar: Title + Buttons in one row -->
            <div class="top-bar">
                <div class="schedule-title">
                    <h2>Stundenplan</h2>
                    <p id="currentScheduleName" class="schedule-name">-</p>
                </div>
                <div class="action-buttons">
                    <button id="toggleWeekBtn" class="btn-week">Nächste Woche →</button>
                    <button id="exportPdfBtn" class="btn-pdf">📄 Als PDF</button>
                    <button id="whatsappBtn" class="btn-whatsapp">💬 WhatsApp</button>
                    <a href="https://www.gesetze-im-internet.de/arbzg/BJNR117100994.html" 
                       target="_blank" 
                       rel="noopener noreferrer" 
                       class="arbeitsgesetz-link">
                       ⚖️ Arbeitsgesetz
                    </a>
                </div>
            </div>

            <div class="table-wrapper" id="scheduleTableWrapper">
                <div class="loading">Lade Stundenplan...</div>
            </div>
        </main>
    </div>

    <script src="storage.js"></script>
    <script src="script.js"></script>
</body>
</html>
