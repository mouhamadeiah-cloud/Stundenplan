<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Die Primel Eiscafé - Stundenplan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-title">
                <h1>Die Primel Eiscafé</h1>
                <p class="subtitle" id="currentDateInfo">Stundenplan für aktuelle Woche, Monat und Jahr</p>
            </div>
            <button class="hamburger" id="hamburgerBtn" aria-label="Menü">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </header>

        <!-- Sidebar Menu -->
        <nav class="sidebar" id="sidebar">
            <ul class="sidebar-menu">
                <li><a href="index.html" class="active">Stundenplan anzeigen</a></li>
                <li><a href="admin.html">Admin-Bereich</a></li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="schedule-info">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 10px;">
                    <div>
                        <h2>Aktueller Stundenplan</h2>
                        <p id="currentScheduleName" class="schedule-name">-</p>
                    </div>
                    <a href="https://www.gesetze-im-internet.de/arbzg/BJNR117100994.html" 
                       target="_blank" 
                       rel="noopener noreferrer" 
                       class="arbeitsgesetz-link">
                       ⚖️ Arbeitsgesetz
                    </a>
                </div>
                <button id="exportPdfBtn" class="btn-pdf">📄 Als PDF speichern</button>
            </div>
            <div class="table-wrapper" id="scheduleTableWrapper">
                <div class="loading">Lade Stundenplan...</div>
            </div>
        </main>
    </div>

    <script src="storage.js"></script>
    <script src="script.js"></script>
</body>
</html>
